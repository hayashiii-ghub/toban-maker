name = "toban-maker"
main = "server/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "toban-maker-db"
database_id = "c115d106-597f-4616-9e44-b73864319a87"
migrations_dir = "server/db/migrations"

[triggers]
crons = ["0 3 * * *"]
