name = "toban-maker"
main = "server/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "toban-maker-db"
# CI では scripts/prepare-wrangler-config.mjs が環境変数から置き換えます
# ローカルで直接 deploy する場合はこの値を自分の D1 Database ID に更新してください
database_id = "__CLOUDFLARE_D1_DATABASE_ID__"
preview_database_id = "__CLOUDFLARE_D1_PREVIEW_DATABASE_ID__"
migrations_dir = "server/db/migrations"

[triggers]
crons = ["0 3 * * *"]
